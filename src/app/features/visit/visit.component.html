<section class="hero">
  <div class="container">
    <h1>{{ copy().title }}</h1>
    <p class="lead">{{ copy().intro }}</p>
  </div>
</section>

<section class="section">
  <div class="container visit-layout">
    <div class="card facts">
      @for (fact of copy().facts; track fact.label) {
        <div class="fact-row">
          <h4>{{ fact.label }}</h4>
          <p>{{ fact.value }}</p>
        </div>
      }
    </div>

    <div class="map-embed">
      <iframe
        src="https://maps.google.com/maps?q=42.3386271,-7.017021&output=embed&z=15"
        width="100%"
        height="100%"
        style="border:0; min-height:340px;"
        allowfullscreen
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade"
        title="Riomao location map"
      ></iframe>
    </div>
  </div>
</section>
